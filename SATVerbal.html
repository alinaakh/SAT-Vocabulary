<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT Vocabulary</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#1a1a1a;--bg:#faf9f7;--panel:#ffffff;--soft:#f2f0ec;--line:#e4e1db;
    --accent:#b0442c;--muted:#8a857c;--faint:#b8b3a9;
    --t1:#4a7a4e;--t1b:#eaf2ea;--t2:#a06a1f;--t2b:#f6eede;--t3:#b0442c;--t3b:#f6e6e1;
  }
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);min-height:100%;padding:28px 20px;
    -webkit-font-smoothing:antialiased}
  .app{max-width:1000px;margin:0 auto}

  header.mast{margin-bottom:26px}
  .mast h1{font-size:clamp(22px,4vw,30px);font-weight:600;letter-spacing:-.02em}
  .mast .sub{font-size:13.5px;color:var(--muted);margin-top:6px;line-height:1.5}
  .mast .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 2px 0 8px;vertical-align:baseline}
  .d1{background:var(--t1)}.d2{background:var(--t2)}.d3{background:var(--t3)}

  /* filters */
  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
  .flabel{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-right:4px}
  .chip{font-size:13px;font-weight:500;border:1px solid var(--line);background:var(--panel);
    color:var(--muted);padding:7px 15px;border-radius:8px;cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--faint)}
  .chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip.t1[aria-pressed="true"]{background:var(--t1);border-color:var(--t1)}
  .chip.t2[aria-pressed="true"]{background:var(--t2);border-color:var(--t2)}
  .chip.t3[aria-pressed="true"]{background:var(--t3);border-color:var(--t3)}

  /* groups grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
  .gcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 17px;
    cursor:pointer;transition:.15s}
  .gcard:hover{border-color:var(--accent);transform:translateY(-2px)}
  .gcard h3{font-size:15px;font-weight:600;line-height:1.25;margin-bottom:5px}
  .gcard .cnt{font-size:11.5px;color:var(--faint);letter-spacing:.02em}
  .gcard .peek{font-size:12.5px;color:var(--muted);margin-top:9px;line-height:1.4;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .gall{background:var(--ink);border-color:var(--ink)}
  .gall h3{color:#fff}.gall .cnt{color:#a8a29a}.gall .peek{color:#c9c3ba}

  /* study */
  .study{display:none}.study.on{display:block}.groups.off{display:none}
  .backbtn{font-size:13px;font-weight:500;background:none;border:0;color:var(--accent);
    cursor:pointer;padding:4px 0;margin-bottom:14px}
  .backbtn:hover{text-decoration:underline}
  .study-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .study-title{font-size:19px;font-weight:600}
  .seg{display:inline-flex;background:var(--soft);border:1px solid var(--line);border-radius:8px;padding:3px;gap:2px}
  .seg button{font-size:12.5px;font-weight:500;border:0;background:transparent;color:var(--muted);
    padding:6px 14px;border-radius:6px;cursor:pointer;transition:.15s}
  .seg button[aria-pressed="true"]{background:var(--ink);color:#fff}

  .layout{display:flex;gap:20px;align-items:stretch}
  .main{flex:1;display:flex;flex-direction:column;align-items:center;gap:14px;min-width:0}
  .counter{font-size:12px;color:var(--faint);letter-spacing:.05em}
  .stage{perspective:1600px;width:100%;max-width:440px}
  .card{position:relative;width:100%;min-height:280px;cursor:pointer;transform-style:preserve-3d;
    transition:transform .5s cubic-bezier(.2,.7,.2,1)}
  .card.flipped{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    box-shadow:0 12px 30px -18px rgba(0,0,0,.25);padding:32px;display:flex;flex-direction:column;
    justify-content:center;align-items:center;text-align:center}
  .back{transform:rotateY(180deg);background:#fdfcfa}
  .tier{position:absolute;top:14px;right:16px;font-size:10px;font-weight:600;letter-spacing:.04em;
    padding:3px 9px;border-radius:6px;text-transform:capitalize}
  .tier.t1{background:var(--t1b);color:var(--t1)}.tier.t2{background:var(--t2b);color:var(--t2)}.tier.t3{background:var(--t3b);color:var(--t3)}
  .term{font-size:clamp(28px,5.5vw,44px);font-weight:600;line-height:1.05;letter-spacing:-.01em}
  .pos{font-style:italic;color:var(--faint);font-size:15px;margin-top:9px}
  .ru{font-size:clamp(22px,4.5vw,32px);font-weight:600;color:var(--accent);line-height:1.2}
  .ex{margin-top:18px;padding-top:15px;border-top:1px solid var(--line);
    font-size:14px;line-height:1.5;color:#5a564e;max-width:40ch}
  .ex u{color:var(--accent);text-decoration:none;font-weight:600}
  .hint{position:absolute;bottom:14px;font-size:11px;color:var(--faint);letter-spacing:.04em}
  .nav{display:flex;gap:24px;align-items:center}
  .nav button{background:none;border:1px solid var(--line);font-size:20px;color:var(--ink);cursor:pointer;
    width:46px;height:46px;border-radius:50%;transition:.15s;line-height:1;display:flex;align-items:center;justify-content:center}
  .nav button:hover{background:var(--soft);border-color:var(--faint)}
  .nav button:disabled{opacity:.3;cursor:default}
  .nav .mid{font-size:16px}

  .sidebar{width:290px;flex-shrink:0;display:flex;flex-direction:column;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .sb-head{padding:13px 15px 11px;border-bottom:1px solid var(--line)}
  .sb-title{font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);margin-bottom:9px}
  .sb-search{width:100%;font-size:14px;color:var(--ink);background:var(--soft);
    border:1px solid var(--line);border-radius:8px;padding:8px 11px;outline:none}
  .sb-search:focus{border-color:var(--accent);background:#fff}
  .sb-list{overflow-y:auto;flex:1;padding:5px;max-height:520px}
  .sb-item{display:flex;justify-content:space-between;gap:10px;align-items:baseline;padding:9px 11px;
    border-radius:7px;cursor:pointer;transition:background .12s}
  .sb-item:hover{background:var(--soft)}
  .sb-item.active{background:var(--t3b);box-shadow:inset 3px 0 0 var(--accent)}
  .sb-w{font-weight:600;font-size:14px}
  .sb-r{font-size:12.5px;color:var(--muted);text-align:right;line-height:1.3}
  .sb-list::-webkit-scrollbar{width:8px}
  .sb-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .sb-empty{padding:20px;text-align:center;color:var(--faint);font-size:13px}

  @media (max-width:780px){
    .layout{flex-direction:column}.sidebar{width:100%}.sb-list{max-height:300px}
  }
  @media (prefers-reduced-motion:reduce){.card,.gcard{transition:none}}
</style>
</head>
<body>
<div class="app">
  <header class="mast">
    <h1>SAT Vocabulary</h1>
    <div class="sub">Pick a theme, then flip through the cards. Levels:
      <span class="dot d1"></span>basic <span class="dot d2"></span>intermediate <span class="dot d3"></span>advanced</div>
  </header>

  <section class="groups" id="groupsScreen">
    <div class="filters">
      <span class="flabel">Level</span>
      <button class="chip lvl" data-lvl="0" aria-pressed="true">All</button>
      <button class="chip lvl t1" data-lvl="1" aria-pressed="false">Basic</button>
      <button class="chip lvl t2" data-lvl="2" aria-pressed="false">Intermediate</button>
      <button class="chip lvl t3" data-lvl="3" aria-pressed="false">Advanced</button>
    </div>
    <div class="grid" id="grid"></div>
  </section>

  <section class="study" id="studyScreen">
    <button class="backbtn" id="back">← All themes</button>
    <div class="study-head">
      <div class="study-title" id="stName"></div>
      <div class="seg" id="orderSeg" role="group">
        <button data-order="shuffle" aria-pressed="true">Shuffle</button>
        <button data-order="alpha" aria-pressed="false">A–Z</button>
      </div>
    </div>
    <div class="layout">
      <div class="main">
        <div class="counter"><span id="cur">1</span> / <span id="total">0</span></div>
        <div class="stage">
          <div class="card" id="card">
            <div class="face front">
              <span class="tier" id="tierF"></span>
              <div class="term" id="term">—</div>
              <div class="pos" id="pos"></div>
              <div class="hint">tap to flip</div>
            </div>
            <div class="face back">
              <div class="ru" id="ru"></div>
              <div class="ex" id="ex"></div>
            </div>
          </div>
        </div>
        <div class="nav">
          <button id="prev">‹</button>
          <button id="shuffle" class="mid" title="Shuffle">⇄</button>
          <button id="next">›</button>
        </div>
      </div>
      <aside class="sidebar">
        <div class="sb-head">
          <div class="sb-title">Words in theme · <span id="sbCount">0</span></div>
          <input type="text" id="sbSearch" class="sb-search" placeholder="Search…" autocomplete="off">
        </div>
        <div class="sb-list" id="sbList"></div>
      </aside>
    </div>
  </section>
</div>

const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
let lvl=0, deck=[], i=0, flipped=false, order='shuffle', curGroup=null;

function shuffle(a){a=a.slice();for(let k=a.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[a[k],a[j]]=[a[j],a[k]]}return a}
function hl(s,w){
  const stem=w.slice(0,Math.max(4,w.length-2)).toLowerCase();
  const lower=s.toLowerCase();
  const pos=lower.indexOf(stem);
  if(pos<0) return s;
  let end=pos;
  while(end<s.length && /[a-z]/i.test(s[end])) end++;
  let start=pos;
  while(start>0 && /[a-z]/i.test(s[start-1])) start--;
  return s.slice(0,start)+'<u>'+s.slice(start,end)+'</u>'+s.slice(end);
}
function posLabel(p){return ({'v.':'verb','n.':'noun','adj.':'adjective','adv.':'adverb'})[p]||p}
function tierName(t){return ({1:'basic',2:'intermediate',3:'advanced'})[t]||''}

function allWords(){const seen=new Set();const out=[];GROUPS.forEach(g=>g.words.forEach(w=>{if(!seen.has(w.w)){seen.add(w.w);out.push(w)}}));return out}
function groupWords(g){return lvl? g.words.filter(w=>w.t===lvl):g.words}

function renderGrid(){
  const grid=$('#grid');grid.innerHTML='';
  const all=allWords().filter(w=>!lvl||w.t===lvl);
  const allTile=document.createElement('div');
  allTile.className='gcard gall';
  allTile.innerHTML='<h3>All words</h3><div class="cnt">'+all.length+' words · mixed</div><div class="peek">Study the whole set without themes.</div>';
  allTile.onclick=()=>openGroup(null);
  grid.appendChild(allTile);
  GROUPS.forEach(g=>{
    const ws=groupWords(g);if(ws.length===0)return;
    const el=document.createElement('div');el.className='gcard';
    const peek=ws.slice(0,4).map(w=>w.w).join(', ');
    el.innerHTML='<h3>'+g.name+'</h3><div class="cnt">'+ws.length+' words</div><div class="peek">'+peek+'</div>';
    el.onclick=()=>openGroup(g);
    grid.appendChild(el);
  });
}
function openGroup(g){
  curGroup=g;
  const src=g?groupWords(g):allWords().filter(w=>!lvl||w.t===lvl);
  $('#stName').textContent=g?g.name:'All words';
  order='shuffle';syncOrder();
  deck=shuffle(src);i=0;
  $('#groupsScreen').classList.add('off');
  $('#studyScreen').classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
  render();buildList();
}
function backToGroups(){$('#studyScreen').classList.remove('on');$('#groupsScreen').classList.remove('off')}
function render(){
  if(deck.length===0)return;
  const c=deck[i];
  $('#total').textContent=deck.length;$('#cur').textContent=i+1;
  $('#term').textContent=c.w;$('#pos').textContent=posLabel(c.p);
  $('#ru').textContent=c.ru;$('#ex').innerHTML=hl(c.ex,c.w);
  const tf=$('#tierF');tf.className='tier t'+c.t;tf.textContent=tierName(c.t);
  flipped=false;$('#card').classList.remove('flipped');
  $('#prev').disabled=i===0;$('#next').disabled=i===deck.length-1;
  highlightActive();
}
function flip(){flipped=!flipped;$('#card').classList.toggle('flipped',flipped)}
function reorder(){deck=order==='alpha'?deck.slice().sort((a,b)=>a.w.localeCompare(b.w)):shuffle(deck);i=0;render();buildList($('#sbSearch').value)}
function syncOrder(){$$('#orderSeg button').forEach(b=>b.setAttribute('aria-pressed',String(b.dataset.order===order)))}
function buildList(filter){
  const list=$('#sbList');const q=(filter||'').trim().toLowerCase();
  list.innerHTML='';let shown=0;
  deck.forEach((c,idx)=>{
    if(q&&!(c.w.toLowerCase().includes(q)||c.ru.toLowerCase().includes(q)))return;
    shown++;
    const row=document.createElement('div');row.className='sb-item';row.dataset.idx=idx;
    row.innerHTML='<span class="sb-w">'+c.w+'</span><span class="sb-r">'+c.ru+'</span>';
    row.onclick=()=>{i=idx;render();scrollActive()};
    list.appendChild(row);
  });
  $('#sbCount').textContent=deck.length;
  if(shown===0)list.innerHTML='<div class="sb-empty">No matches</div>';
  highlightActive();
}
function highlightActive(){$$('.sb-item').forEach(el=>el.classList.toggle('active',+el.dataset.idx===i))}
function scrollActive(){const el=$('.sb-item.active');if(el)el.scrollIntoView({block:'nearest'})}

$('#card').onclick=flip;
$('#next').onclick=()=>{if(i<deck.length-1){i++;render();scrollActive()}};
$('#prev').onclick=()=>{if(i>0){i--;render();scrollActive()}};
$('#shuffle').onclick=()=>{order='shuffle';syncOrder();deck=shuffle(deck);i=0;render();buildList($('#sbSearch').value)};
$('#back').onclick=backToGroups;
$('#sbSearch').oninput=e=>buildList(e.target.value);
$$('#orderSeg button').forEach(b=>b.onclick=()=>{order=b.dataset.order;syncOrder();reorder()});
$$('.chip.lvl').forEach(b=>b.onclick=()=>{lvl=+b.dataset.lvl;$$('.chip.lvl').forEach(x=>x.setAttribute('aria-pressed',String(x===b)));renderGrid()});
document.addEventListener('keydown',e=>{
  if(!$('#studyScreen').classList.contains('on'))return;
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();flip()}
  else if(e.code==='ArrowRight'){if(i<deck.length-1){i++;render();scrollActive()}}
  else if(e.code==='ArrowLeft'){if(i>0){i--;render();scrollActive()}}
  else if(e.code==='Escape'){backToGroups()}
});
renderGrid();
</script>
